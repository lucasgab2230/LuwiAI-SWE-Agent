name: Bug Report
description: Report a bug to help us improve LuwiAI
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Fill out the fields below to help us fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: When I try to review a PR, the agent returns an empty response...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See the error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
      placeholder: The agent should have returned a full code review...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Copy and paste any relevant logs, error messages, or screenshots.
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running the agent?
      options:
        - Local (self-hosted)
        - Cloud (LuwiAI hosted)
        - CI (GitHub Actions)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Agent Version
      description: What version of LuwiAI are you running? (check the server logs or package.json)
      placeholder: "1.0.0"

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/luwi-ai/.github/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true