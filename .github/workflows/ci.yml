name: LuwiAI-SWE-Agent CI

on:
    push:
        branches: [ main, develop ]
    pull_request:
        branches: [ main ]

jobs:
    # Job to verify the Client (Frontend)
    build-client:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./client
        steps:
            - uses: actions/checkout@v6
            
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '24'
                cache: 'npm'
                cache-dependency-path: ./client/package-lock.json
            
            - name: Install dependencies
              run: npm ci

            - name: Run Build
              run: npm run build

    # Job to verify the Server (Backend)
    build-server:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./server
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '24'
                cache: 'npm'
                cache-dependency-path: ./server/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run Build
              run: npm run build
    
    security-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Audit Dependencies
              run: npm audit --prefix ./server